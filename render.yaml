databases:
  - name: trading-db
    plan: free

services:
  - type: web
    name: trading-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm run build:render && npm run db:migrate:deploy && npx prisma generate
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
